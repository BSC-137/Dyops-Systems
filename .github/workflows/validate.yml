name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dyops_core
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dyops_core -> target

      - name: Run Rust tests
        run: cargo test --locked

  python-scenarios:
    name: Python scenarios
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dyops_core
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: dyops_core/pyproject.toml

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dyops_core -> target

      - name: Create validation environment
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip maturin numpy loguru
          echo "${{ github.workspace }}/dyops_core/.venv/bin" >> "$GITHUB_PATH"

      - name: Build Python extension
        run: maturin develop --release --locked

      - name: Run threshold-gated scenarios
        run: python -m scenarios.run --all

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v

      - name: Run historical evaluation harness smoke
        run: |
          python -m historical_eval.cli evaluate \
            --dataset historical_eval/fixtures/synthetic_reference.csv \
            --catalog historical_eval/manifests/synthetic_reference.events.json \
            --json-output /tmp/historical_evaluation.json \
            --markdown-output /tmp/historical_evaluation.md

      - name: Install backend contract test dependencies
        working-directory: ${{ github.workspace }}
        run: python -m pip install -r backend/requirements-test.txt

      - name: Run backend API contract tests
        working-directory: ${{ github.workspace }}
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/dyops_core
          GEMINI_API_KEY: ""
          GOOGLE_API_KEY: ""
        run: pytest backend/tests -q

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        env:
          DYOPS_DEMO_INJECT: "0"
        run: docker compose build

      - name: Start stack
        env:
          DYOPS_DEMO_INJECT: "0"
        run: docker compose up -d

      - name: Wait for API and verify safe status
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/status > /tmp/status.json; then
              break
            fi
            sleep 2
          done
          python - <<'PY'
          import json
          with open("/tmp/status.json", encoding="utf-8") as handle:
              status = json.load(handle)
          assert status["persistence_healthy"] is True
          assert status["demo_inject_enabled"] is False
          assert status["replay_window_events"] == 1000
          PY
          curl -fsS http://localhost:8080/ >/dev/null

      - name: Show logs on failure
        if: failure()
        run: |
          echo "::group::docker compose ps"
          docker compose ps -a || true
          echo "::endgroup::"
          echo "::group::docker compose logs"
          docker compose logs || true
          echo "::endgroup::"

      - name: Stop stack
        if: always()
        run: docker compose down -v
